<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nano Multiplayer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="lobby">
    <h1>Ӿ Nano Multiplayer</h1>
    <p class="subtitle">Join an existing room or create a new one</p>

    <form class="lobby-form" action="/game" method="get">
      <input
        type="text"
        name="room"
        id="room-input"
        placeholder="Room name"
        autocomplete="off"
        required
      >
      <button type="submit">Join / Create</button>
    </form>

    <div class="room-list-wrap">
      <h2 class="room-list-title">Active Rooms</h2>
      <ul class="room-list" id="room-list">
        <li class="room-list-empty">No rooms open yet — create one above</li>
      </ul>
    </div>
  </div>

  <script>
    // Poll /api/rooms every 3 s and re-render the list.
    async function loadRooms() {
      try {
        const res = await fetch("/api/rooms");
        const rooms = await res.json();
        renderRooms(rooms);
      } catch {
        // Silently ignore network errors between polls.
      }
    }

    function renderRooms(rooms) {
      const list = document.getElementById("room-list");

      if (!rooms || rooms.length === 0) {
        list.innerHTML = '<li class="room-list-empty">No rooms open yet — create one above</li>';
        return;
      }

      list.innerHTML = rooms
        .map(r => `
          <li class="room-item">
            <span class="room-name">${escapeHtml(r.id)}</span>
            <span class="room-players">${r.playerCount} player${r.playerCount === 1 ? "" : "s"}</span>
            <a class="room-join-btn" href="/game/${encodeURIComponent(r.id)}">Join</a>
          </li>
        `)
        .join("");
    }

    // Prevent XSS from room names set by other users.
    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    loadRooms();
    setInterval(loadRooms, 3000);
  </script>
</body>
</html>

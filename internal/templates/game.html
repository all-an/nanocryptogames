<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ӿ {{.RoomID}}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="game-wrap">
    <div class="game-header">
      <span class="room-label">Room: <strong>{{.RoomID}}</strong></span>
      <a href="/" class="leave">Leave</a>
    </div>

    <!-- data-room is read by game.js to build the WebSocket URL -->
    <canvas id="game" data-room="{{.RoomID}}" width="1000" height="680"></canvas>

    <p class="controls-hint">Move: WASD / arrow keys &nbsp;·&nbsp; or click a reachable square</p>
  </div>

  <!-- Action modal — shows Move only (empty cell) or Move + Shoot (enemy cell) -->
  <div id="move-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-box">
      <p class="modal-title" id="modal-title">Move here?</p>
      <div class="modal-actions">
        <button id="modal-confirm">Move</button>
        <button id="modal-shoot" class="btn-danger hidden">Shoot</button>
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Death overlay — shown when this player is killed -->
  <div id="death-overlay" class="modal hidden" role="alert">
    <div class="modal-box">
      <p class="modal-title">You were eliminated</p>
      <p class="modal-sub">Spectating for 2 seconds…</p>
    </div>
  </div>

  <script src="/static/game.js"></script>
</body>
</html>

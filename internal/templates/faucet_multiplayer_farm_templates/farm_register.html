<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nano Farm — Create Account</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/faucet_multiplayer_farm_static/farm.css">
  <link rel="stylesheet" href="/static/wallet/wallet.css">
</head>
<body>
  <div class="farm-auth-wrap">
    <header class="farm-auth-header">
      <h1 class="farm-title">🌾 Nano Faucet Farm</h1>
      <p class="farm-subtitle">Create your account</p>
    </header>

    {{if .Error}}
    <div class="farm-error">{{.Error}}</div>
    {{end}}

    <div class="farm-card" style="width:100%;max-width:420px;">
      <h2>New Farmer</h2>

      <div class="farm-warning" style="margin-bottom:16px;">
        💾 <strong>Remember your username and password.</strong> They are the only way to sign back in — we do not store a recovery method.
      </div>

      <form id="register-form" method="POST" action="/farm/register" class="farm-form">
        <label>Username <span class="farm-hint">(3–20 chars, letters/digits/_ -)</span>
          <input type="text" name="username" required autocomplete="username" maxlength="20" placeholder="HeroName">
        </label>
        <label>Password <span class="farm-hint">(min 6 chars)</span>
          <input type="password" name="password" required autocomplete="new-password" minlength="6" placeholder="••••••">
        </label>
        <label>Email
          <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
        </label>
        <input type="hidden" name="nano_address" id="import-address-hidden">
        <button type="button" id="register-btn" class="farm-btn farm-btn--secondary">Create Farmer</button>
      </form>
    </div>

    <footer class="farm-auth-footer" style="margin-top:24px;">
      <a href="/farm" class="farm-back">← Back to login</a>
    </footer>
  </div>

  <script>
    (function () {
      var COPY_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      var CHECK_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

      var form         = document.getElementById('register-form');
      var registerBtn  = document.getElementById('register-btn');
      var importHidden = document.getElementById('import-address-hidden');

      registerBtn.addEventListener('click', function () {
        if (!form.reportValidity()) return;

        registerBtn.disabled    = true;
        registerBtn.textContent = 'Creating wallet…';

        fetch('/wallet/create', { method: 'POST' })
          .then(function (res) {
            if (!res.ok) throw new Error('server error ' + res.status);
            return res.json();
          })
          .then(function (data) {
            showSeedModal(data.seed, data.address, function () {
              importHidden.value = data.address;
              form.submit();
            });
          })
          .catch(function (err) {
            console.error('wallet create:', err);
            registerBtn.disabled    = false;
            registerBtn.textContent = 'Create Farmer';
            alert('Could not generate wallet. Please try again.');
          });
      });

      function showSeedModal(seed, address, onSaved) {
        var overlay = document.createElement('div');
        overlay.className = 'wallet-overlay';
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.innerHTML =
          '<div class="wallet-modal">' +
            '<div class="wallet-modal-icon">💳</div>' +
            '<h2 class="wallet-modal-title">Your Nano Wallet</h2>' +
            '<p class="wallet-modal-subtitle">Generated locally — never stored on our servers.</p>' +
            '<div class="wallet-modal-warning">' +
              '⚠ <strong>Save your seed now.</strong> This is the only time it will be shown. ' +
              'Anyone with this seed controls your wallet. Store it somewhere safe and private.' +
            '</div>' +
            '<p class="wallet-modal-label">Seed (64 hex characters)</p>' +
            '<div class="wallet-seed-row">' +
              '<div class="wallet-seed-box" id="ws-seed-text">' + seed + '</div>' +
              '<button class="wallet-copy-btn" id="ws-copy-btn" title="Copy seed" type="button">' + COPY_ICON + '</button>' +
            '</div>' +
            '<p class="wallet-modal-label">Address (index 0)</p>' +
            '<div class="wallet-address-box">' + address + '</div>' +
            '<button class="wallet-modal-close" id="ws-close-btn" type="button">I have saved my seed — enter the game</button>' +
          '</div>';

        document.body.appendChild(overlay);

        overlay.querySelector('#ws-copy-btn').addEventListener('click', function () {
          var btn = overlay.querySelector('#ws-copy-btn');
          navigator.clipboard.writeText(seed).then(function () {
            btn.innerHTML = CHECK_ICON;
            btn.classList.add('copied');
            setTimeout(function () {
              btn.innerHTML = COPY_ICON;
              btn.classList.remove('copied');
            }, 2000);
          }).catch(function () {
            var box = overlay.querySelector('#ws-seed-text');
            var range = document.createRange();
            range.selectNodeContents(box);
            var sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
          });
        });

        overlay.querySelector('#ws-close-btn').addEventListener('click', function () {
          overlay.remove();
          onSaved();
        });
      }
    }());
  </script>
</body>
</html>

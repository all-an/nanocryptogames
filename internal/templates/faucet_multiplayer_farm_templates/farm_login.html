<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nano Farm — Login</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/faucet_multiplayer_farm_static/farm.css">
</head>
<body>
  <div class="farm-auth-wrap">
    <header class="farm-auth-header">
      <h1 class="farm-title">🌾 Nano Faucet Farm</h1>
      <p class="farm-subtitle">A multiplayer role-playing world powered by Nano</p>
    </header>

    {{if .Error}}
    <div class="farm-error">{{.Error}}</div>
    {{end}}

    <div class="farm-auth-cards">

      <!-- Login -->
      <div class="farm-card">
        <h2>Sign In</h2>
        <form method="POST" action="/farm/login" class="farm-form">
          <label>Username
            <input type="text" name="username" required autocomplete="username" maxlength="20" placeholder="YourName">
          </label>
          <label>Password
            <input type="password" name="password" required autocomplete="current-password" placeholder="••••••">
          </label>
          <button type="submit" class="farm-btn farm-btn--primary">Enter World</button>
        </form>
      </div>

      <!-- Register -->
      <div class="farm-card" style="text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <h2>New Farmer</h2>
        <p class="farm-card-note">Create an account and choose how to manage your Nano wallet.</p>
        <a href="/farm/register" class="farm-btn farm-btn--secondary" style="display:inline-block;text-align:center;">Create Farmer</a>
      </div>

    </div>

    <footer class="farm-auth-footer">
      <a href="/" class="farm-back">← Back to games</a>
    </footer>
  </div>
</body>
</html>
